<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
    <head>
        <meta charset="UTF-8">        
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Kpop - Connexion</title>

        <script src="bootstrap-5.3.8/js/bootstrap.js"></script>
        <script src="fontawesome-7.2.0/js/all.js"></script>
        <link rel="stylesheet" href="bootstrap-5.3.8/css/bootstrap.css">
    </head>
    <body class="">
        <div class="container-fluid">
            <div class="row justify-content-center">
                <div class="col-4 mt-5 shadow rounded border p-5">
                    
                    <div class="row justify-content-center mb-3">
                        <i class="fa-solid fa-circle-user fa-3x"></i>
                    </div>  
                    
                    <div class="row mb-3">
                        <div class="form">
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="login" placeholder="">
                                <label for="floatingInput">Nom d'utilisateur</label>
                            </div>
                            <div class="form-floating">
                                <input type="password" class="form-control" id="password" placeholder="">
                                <label for="floatingPassword">Mot de passe</label>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col text-center">
                            <button class="btn btn-outline-primary">
                                <i class="fa-solid fa-arrow-right-to-bracket"></i>
                                Se connecter
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
