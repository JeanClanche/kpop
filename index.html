<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
    <head>
        <meta charset="UTF-8">        
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Kpop - Boutique</title>
        <link rel="icon" type="image/x-icon" href="/images/bts-logo.jpg">

        <script src="bootstrap-5.3.8/js/bootstrap.js"></script>
        <script src="fontawesome-7.2.0/js/all.js"></script>
        <script src="js/boutique.js"></script>

        <link rel="stylesheet" href="bootstrap-5.3.8/css/bootstrap.css">
        <link rel="stylesheet" href="css/custom.css">
    </head>
    <body class="image-bg">
        <nav class="navbar navbar-expand-lg bg-body-tertiary nav-underline">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Boutique Blanchard</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapse">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="collapse">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="#">Boutique</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Mon compte</a>
                        </li>
                    </ul>
                        <form class="d-flex">

                            <button class="btn btn-outline-light me-2" type="button">
                                <i class="fa-solid fa-language"></i>
                                FR
                                <i class="fa-solid fa-caret-down"></i>
                            </button>
                            
                            <button class="btn btn-outline-success me-2" type="button">
                                <i class="fa-solid fa-basket-shopping"></i>
                                <span id="textPanier">
                                    Panier (3)
                                </span>
                            </button>

                        </form>
                </div>
            </div>
        </nav>

        <div class="container-fluid">
            <div class="col p-2 bg-dark rounded mt-2 m-lg-5">

                <div class="row justify-content-center p-2 m-3">
                    <div class="col-md-4 col">
                        <div class="input-group mb-3">
                            <input type="text" class="form-control" placeholder="Rechercher" id="recherche">
                            <label class="input-group-text" for="recherche">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="row border shadow rounded p-3 m-md-3 justify-content-around" id="affichage">

                </div>
            </div>
        </div>

        <div class="" id="footer">

        </div>
    </body>
</html>
